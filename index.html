<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VK Monitor callback</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      align-items: center;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
    }

    main {
      max-width: 680px;
      width: 100%;
    }

    code {
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main>
    <h1>VK Monitor</h1>
    <p id="status">Завершаем подключение VK...</p>
    <p>
      Если приложение не открылось автоматически, убедитесь, что VK Monitor запущен
      на этом компьютере, и обновите эту страницу.
    </p>
    <p><code id="target"></code></p>
  </main>

  <script>
    (function () {
      const localCallback = "http://127.0.0.1:8765/callback";
      const payload = window.location.hash || window.location.search;
      const target = localCallback + payload;

      document.getElementById("target").textContent = target;

      if (!payload) {
        document.getElementById("status").textContent =
          "VK не передал данные авторизации. Вернитесь в VK Monitor и попробуйте подключиться ещё раз.";
        return;
      }

      window.location.replace(target);
    })();
  </script>
</body>
</html>
