<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>VK Callback</title>
</head>
<body>
  <p>Возвращаем вас в приложение...</p>

  <script>
    const hash = window.location.hash || "";
    const query = window.location.search || "";

    const target = "http://127.0.0.1:8765/callback" + query + hash;

    window.location.replace(target);
  </script>
</body>
</html>
